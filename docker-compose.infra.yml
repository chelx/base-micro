# ─────────────────────────────────────────────────────────────
# Epic 3: Platform Infrastructure — Docker Compose
# Usage:
#   docker compose --env-file infra/.env -f docker-compose.infra.yml up -d
#   docker compose -f docker-compose.infra.yml ps
#   docker compose -f docker-compose.infra.yml down -v   # xoá cả volumes
# ─────────────────────────────────────────────────────────────

services:
  # ════════════════════════════════════════════════════════════
  # 1. API GATEWAY — Nginx (Rate-limiting + Reverse Proxy)
  # ════════════════════════════════════════════════════════════
  nginx:
    image: nginx:1.25-alpine
    container_name: infra-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - infra-public
      - infra-internal
    depends_on:
      consul-server-1:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/nginx-health']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # 2. SERVICE DISCOVERY — Consul (3-node HA cluster)
  # ════════════════════════════════════════════════════════════
  consul-server-1:
    image: hashicorp/consul:1.17
    container_name: infra-consul-1
    command: agent -server -bootstrap-expect=3 -node=consul-1 -client=0.0.0.0 -ui
    environment:
      CONSUL_BIND_INTERFACE: eth0
    ports:
      - '8500:8500' # UI + HTTP API
      - '8600:8600/udp' # DNS
    networks:
      - infra-internal
    volumes:
      - consul-data-1:/consul/data
    healthcheck:
      test: ['CMD', 'consul', 'members']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  consul-server-2:
    image: hashicorp/consul:1.17
    container_name: infra-consul-2
    command: agent -server -node=consul-2 -client=0.0.0.0 -retry-join=consul-server-1
    environment:
      CONSUL_BIND_INTERFACE: eth0
    networks:
      - infra-internal
    volumes:
      - consul-data-2:/consul/data
    depends_on:
      consul-server-1:
        condition: service_healthy
    restart: unless-stopped

  consul-server-3:
    image: hashicorp/consul:1.17
    container_name: infra-consul-3
    command: agent -server -node=consul-3 -client=0.0.0.0 -retry-join=consul-server-1
    environment:
      CONSUL_BIND_INTERFACE: eth0
    networks:
      - infra-internal
    volumes:
      - consul-data-3:/consul/data
    depends_on:
      consul-server-1:
        condition: service_healthy
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # 3. MESSAGE BROKER — Kafka (KRaft mode, no ZooKeeper)
  # ════════════════════════════════════════════════════════════
  kafka:
    image: bitnami/kafka:3.7
    container_name: infra-kafka
    ports:
      - '9092:9092' # Client
      - '9094:9094' # External
    environment:
      # KRaft mode
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID}
      # Listeners
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topics tự tạo
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # Performance
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      # JMX Metrics
      KAFKA_JMX_PORT: 9404
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - infra-internal
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Kafka Init: tạo sẵn topics ──
  kafka-init:
    image: bitnami/kafka:3.7
    container_name: infra-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ['/bin/bash', '-c']
    command:
      - |
        echo "⏳ Creating Kafka topics..."
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic system.audit.log --partitions 3 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic system.notifications --partitions 3 --replication-factor 1
        echo "✅ Topics created:"
        kafka-topics.sh --bootstrap-server kafka:9092 --list
    networks:
      - infra-internal

  # ════════════════════════════════════════════════════════════
  # 4. DISTRIBUTED CACHE — Redis (Master-Slave)
  # ════════════════════════════════════════════════════════════
  redis-master:
    image: bitnami/redis:7.2
    container_name: infra-redis-master
    ports:
      - '6379:6379'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_AOF_ENABLED: 'yes'
    volumes:
      - redis-master-data:/bitnami/redis/data
    networks:
      - infra-internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-slave:
    image: bitnami/redis:7.2
    container_name: infra-redis-slave
    ports:
      - '6380:6379'
    environment:
      REDIS_REPLICATION_MODE: slave
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PORT_NUMBER: 6379
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - infra-internal
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # 5. LOGGING — Elasticsearch + Kibana
  # ════════════════════════════════════════════════════════════
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: infra-elasticsearch
    ports:
      - '9200:9200'
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      xpack.security.enrollment.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
      cluster.name: infra-logging
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - infra-internal
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: infra-kibana
    ports:
      - '5601:5601'
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      SERVER_NAME: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - infra-internal
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:5601/api/status || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # 6. OBSERVABILITY — Prometheus + Grafana + Jaeger
  # ════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: infra-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - infra-internal
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9090/-/healthy']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: infra-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - infra-internal
    healthcheck:
      test:
        ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: infra-jaeger
    ports:
      - '16686:16686' # Jaeger UI
      - '4318:4318' # OTLP HTTP
      - '4317:4317' # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    networks:
      - infra-internal
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:16686/']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Redis Exporter (for Prometheus) ──
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: infra-redis-exporter
    environment:
      REDIS_ADDR: redis://redis-master:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - infra-internal
    restart: unless-stopped

# ════════════════════════════════════════════════════════════
# NETWORKS
# ════════════════════════════════════════════════════════════
networks:
  infra-public:
    driver: bridge
  infra-internal:
    driver: bridge

# ════════════════════════════════════════════════════════════
# VOLUMES (Persistent)
# ════════════════════════════════════════════════════════════
volumes:
  consul-data-1:
  consul-data-2:
  consul-data-3:
  kafka-data:
  redis-master-data:
  es-data:
  prometheus-data:
  grafana-data:
