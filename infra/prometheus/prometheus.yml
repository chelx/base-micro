# ─── Prometheus Scrape Configuration ───

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── Prometheus self-monitoring ──
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Kafka metrics (JMX Exporter) ──
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9404']
    scrape_interval: 10s

  # ── Redis metrics ──
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ── Consul metrics ──
  - job_name: 'consul'
    metrics_path: '/v1/agent/metrics'
    params:
      format: ['prometheus']
    static_configs:
      - targets: ['consul-server-1:8500']

  # ── Nginx metrics (stub_status) ──
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:8080']

  # ── NestJS Microservices (khi deploy) ──
  # - job_name: 'nestjs-apps'
  #   static_configs:
  #     - targets: ['host.docker.internal:3000']
  #   metrics_path: '/metrics'
