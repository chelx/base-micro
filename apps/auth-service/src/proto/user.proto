syntax = "proto3";

package user;

service UserService {
  rpc GetUserProfile (UserIdRequest) returns (UserProfileResponse);
  rpc GetUserPermissions (UserIdRequest) returns (UserPermissionsResponse);
  rpc VerifyCredentials (VerifyCredentialsRequest) returns (VerifyCredentialsResponse);
}

message VerifyCredentialsRequest {
  string username_or_email = 1;
  string password = 2;
}

message VerifyCredentialsResponse {
  bool success = 1;
  string user_id = 2;
  string email = 3;
  repeated string roles = 4;
}

message UserIdRequest {
  string user_id = 1;
}

message UserProfileResponse {
  string user_id = 1;
  string email = 2;
  string username = 3;
  string status = 4;
  string first_name = 5;
  string last_name = 6;
  string phone = 7;
  string address = 8;
  repeated string roles = 9;
}

message PermissionItem {
  string resource = 1;
  string action = 2;
}

message UserPermissionsResponse {
  string user_id = 1;
  repeated PermissionItem permissions = 2;
}
